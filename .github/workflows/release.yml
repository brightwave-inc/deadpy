name: Release

# Publishes to crates.io when a GitHub Release is published.
#
# Authenticated via crates.io Trusted Publishing (OIDC) — the publish is tied to
# THIS repository (brightwave-inc/deadpy), not any individual's API token.
#
# One-time setup (see README / the repo's release docs):
#   1. Publish v0.1.0 once manually (`cargo publish`) to create the crate.
#   2. Add the org team as an owner:  cargo owner --add github:brightwave-inc:engineering
#   3. On https://crates.io/crates/deadpy/settings, add a Trusted Publisher:
#        repository = brightwave-inc/deadpy, workflow = release.yml
#   4. (Optional) Enable "Require Trusted Publishing" to disable token publishing.
#
# After that: bump the version in Cargo.toml, cut a GitHub Release, and this runs.

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Verify the release compiles and passes tests before publishing an
      # immutable version to crates.io.
      - run: cargo test --release
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  # Build prebuilt binaries and attach them to the GitHub Release, so consumers
  # (and our own CI, via cargo-binstall) can install deadpy without compiling.
  binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (CI runners, most servers) + aarch64 (ARM containers,
          # Graviton) and Apple Silicon macOS (local dev). Anyone on another
          # platform falls back to `cargo install` / `cargo binstall` compiling
          # from source, so this list only needs the common targets.
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: deadpy
          target: ${{ matrix.target }}
          archive: $bin-$target
          token: ${{ secrets.GITHUB_TOKEN }}
